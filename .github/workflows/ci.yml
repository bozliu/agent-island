name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Verify toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Build debug app target
        run: swift build -c debug --product AgentIslandApp

      - name: Build packaged app bundle
        run: scripts/build-app.sh
